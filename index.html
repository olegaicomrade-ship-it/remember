<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ты помнишь?</title>
    <script type="application/ld+json" id="seo-data">{}</script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: Georgia, serif; overflow: hidden;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .main-text {
            font-size: 2.5rem; text-align: center;
            user-select: none;
        }
        /* Монетизация полностью отключена для теста виральности */
        #donate-btn {
            display: none;
        }
    </style>
</head>
<body>

    <div class="main-text">Ты помнишь?</div>
    
    <script>
        const body = document.body;

        // Клик в любом месте вызывает только системное меню "Поделиться"
        body.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Ты помнишь?',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Меню закрыто');
                }
            } else {
                // Резервный вариант для ПК: копирование ссылки в буфер
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    alert('Ссылка скопирована');
                } catch (err) {
                    console.log('Ошибка копирования');
                }
            }
        });
    </script>
</body>
</html>
