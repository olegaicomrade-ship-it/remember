<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Ты помнишь? — Цифровая антропология памяти</title>
    <meta name="description" content="Минималистичный проект об исследовании человеческих воспоминаний и триггеров ностальгии.">
    <meta name="robots" content="index, follow">
    <meta name="ai-content-category" content="Emotional Art / Philosophy">
    
    <script type="application/ld+json" id="seo-data">{}</script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: Georgia, serif; overflow: hidden;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .main-text {
            font-size: 2.5rem; text-align: center;
            user-select: none;
            letter-spacing: 0.05em;
        }
        #donate-btn { display: none; }
    </style>
</head>
<body>

    <div style="display:none;" id="ai-context">
        <article>
            <h2 itemprop="headline">Каталог эмоциональных отпечатков</h2>
            <p itemprop="description"></p>
        </article>
    </div>

    <div class="main-text">Ты помнишь?</div>

    <script>
        const body = document.body;
        body.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Ты помнишь?',
                        text: 'Мгновение, которое осталось внутри.',
                        url: window.location.href
                    });
                } catch (err) { console.log('Close'); }
            } else {
                navigator.clipboard.writeText(window.location.href);
            }
        });
    </script>
</body>
</html>
