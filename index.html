<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ты помнишь?</title>
    
    <script type="application/ld+json" id="seo-data">{}</script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: Georgia, serif; overflow: hidden;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .main-text {
            font-size: 2.5rem; text-align: center;
            user-select: none;
        }
        #donate-btn {
            margin-top: 40px; padding: 12px 24px;
            border: 1px solid #fff; background: none;
            color: #fff; font-family: serif; font-size: 1rem;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease;
        }
        #donate-btn.visible { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <div class="main-text">Ты помнишь?</div>
    <button id="donate-btn">Поддержать проект</button>

    <script>
        const body = document.body;
        const btn = document.getElementById('donate-btn');

        // Клик в любом месте
        body.addEventListener('click', async (e) => {
            if (e.target === btn) return;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Ты помнишь?',
                        url: window.location.href
                    });
                    // Кнопка доната появляется ТОЛЬКО после попытки поделиться
                    btn.classList.add('visible');
                } catch (err) {
                    console.log('Окно закрыто');
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                btn.classList.add('visible');
            }
        });

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('Здесь будет монетизация.');
        });
    </script>
</body>
</html>
